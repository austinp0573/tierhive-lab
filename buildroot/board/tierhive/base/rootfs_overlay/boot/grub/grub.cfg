# tierhive grub config - bios/mbr boot, virtio-blk root
#
# the root partition is /dev/vda1 (virtio block device a, partition 1).
# the kernel is at /boot/bzImage on that same partition.
#
# net.ifnames=0 biosdevname=0: force eth0 naming for the virtio nic.
# without these flags the nic gets a predictable name like ens3, and
# /etc/network/interfaces would need to reference that instead.

set default=0
set timeout=3

menuentry "tierhive" {
    set root=(hd0,msdos1)
    linux /boot/bzImage root=/dev/vda1 rootfstype=ext4 rw console=ttyS0,115200 net.ifnames=0 biosdevname=0
}
